    #   depends_on:
    #     - redis

    # shipping:
    #   build:
    #     context: ./shipping
    #     dockerfile: dockerfile
    #   image: shipping:1.0
    #   container_name: shipping
    #   depends_on:
    #     - mysql
    redis:
      image: redis:7.0
      container_name: redis
