services:
  mongodb:
    build:
      context: ./mongodb
      dockerfile: dockerfile
    image: mongodb:1.0
    container_name: mongodb
  catalogue:
    build:
      context: ./catalogue
      dockerfile: dockerfile
    image: catalogue:1.0
    container_name: catalogue
    depends_on:
      - mongodb
    # mysql:
    #   build:
    #     context: ./mysql
    #     dockerfile: dockerfile
    #   image: mysql:1.0
    #   container_name: mysql
  user:
    build:
      context: ./user
      dockerfile: dockerfile
    image: user:1.0
    container_name: user
    depends_on:
      - redis
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    image: frontend:1.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
    # cart:
